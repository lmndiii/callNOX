<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WebCall — Звонки и Чат</title>
    <!-- Firebase SDK Compat (работает без сборщиков прямо в браузере) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <!-- PeerJS для WebRTC аудио-видео звонков и файлов -->
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <!-- Tailwind CSS для дизайна -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Плавные переходы для мобильного интерфейса */
        .page-transition {
            transition: all 0.3s ease-in-out;
        }
        /* Скрытие полосы прокрутки */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen flex flex-col font-sans overflow-hidden select-none">

    <!-- Кастомные всплывающие уведомления (вместо alert) -->
    <div id="toast" class="fixed top-4 left-1/2 -translate-x-1/2 z-50 bg-gray-900 border border-gray-800 px-4 py-3 rounded-xl shadow-2xl flex items-center gap-2 text-xs text-indigo-400 font-semibold opacity-0 pointer-events-none transition-all duration-300">
        <i class="fa-solid fa-circle-info"></i>
        <span id="toast-text">Уведомление</span>
    </div>

    <!-- 1. ЭКРАН АВТОРИЗАЦИИ -->
    <div id="auth-screen" class="flex-grow flex items-center justify-center p-4">
        <div class="w-full max-w-sm bg-gray-900 border border-gray-800 rounded-2xl p-6 space-y-6 shadow-xl">
            <div class="text-center space-y-2">
                <div class="inline-flex items-center justify-center w-14 h-14 bg-indigo-600 rounded-2xl text-2xl text-white shadow-lg shadow-indigo-500/30">
                    <i class="fa-solid fa-phone-flip"></i>
                </div>
                <h1 class="text-2xl font-black bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent">WebCall Mobile</h1>
                <p class="text-gray-400 text-xs">Введите имя и пароль для авторизации</p>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-1.5">Юзернейм</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-500 text-sm">@</span>
                        <input id="username-input" type="text" placeholder="ivan_99" class="w-full pl-8 pr-4 py-2.5 bg-gray-950 border border-gray-850 rounded-xl focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500/20 outline-none transition text-sm text-white">
                    </div>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-1.5">Пароль (мин. 6 знаков)</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-500 text-sm">
                            <i class="fa-solid fa-lock"></i>
                        </span>
                        <input id="password-input" type="password" placeholder="••••••••" class="w-full pl-9 pr-4 py-2.5 bg-gray-950 border border-gray-855 rounded-xl focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500/20 outline-none transition text-sm text-white">
                    </div>
                </div>
            </div>

            <div class="flex flex-col gap-2 pt-2">
                <button onclick="authAction(true)" class="w-full py-3 px-4 bg-indigo-600 hover:bg-indigo-500 active:scale-95 text-white font-bold rounded-xl text-xs transition shadow-lg shadow-indigo-600/20">
                    Создать аккаунт
                </button>
                <button onclick="authAction(false)" class="w-full py-3 px-4 bg-gray-800 hover:bg-gray-700 active:scale-95 text-gray-300 font-semibold rounded-xl text-xs border border-gray-700 transition">
                    Войти в профиль
                </button>
            </div>
        </div>
    </div>

    <!-- 2. ГЛАВНЫЙ ЭКРАН (Мобильная верстка: список чатов / активный чат) -->
    <div id="main-screen" class="hidden flex-grow flex flex-col h-screen overflow-hidden">
        
        <!-- Список чатов и контактов (Левая панель / Первый экран на мобилках) -->
        <div id="chats-panel" class="w-full h-full flex flex-col bg-gray-950">
            <!-- Профиль и выход -->
            <div class="p-4 bg-gray-900 border-b border-gray-850 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-indigo-600 rounded-full flex items-center justify-center font-black text-white text-sm" id="my-avatar">?</div>
                    <div>
                        <div class="font-bold text-sm">@<span id="my-username-label">...</span></div>
                        <div class="text-[10px] text-green-400 flex items-center gap-1">
                            <span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span> в сети
                        </div>
                    </div>
                </div>
                <div class="flex items-center gap-1">
                    <button onclick="openGroupDialog()" class="p-2 text-emerald-400 hover:bg-gray-800 rounded-lg text-sm" title="Групповой созвон">
                        <i class="fa-solid fa-users"></i>
                    </button>
                    <button onclick="signOutUser()" class="p-2 text-gray-400 hover:text-red-400 hover:bg-gray-800 rounded-lg text-sm">
                        <i class="fa-solid fa-right-from-bracket"></i>
                    </button>
                </div>
            </div>

            <!-- Живой поиск -->
            <div class="p-3 bg-gray-900/50">
                <div class="relative">
                    <input id="search-input" type="text" placeholder="Найти собеседника..." class="w-full pl-9 pr-4 py-2 bg-gray-900 border border-gray-800 rounded-xl text-xs focus:border-indigo-500 outline-none text-white">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-500 text-xs">
                        <i class="fa-solid fa-search"></i>
                    </span>
                </div>
            </div>

            <!-- Список контактов -->
            <div id="contacts-list" class="flex-grow overflow-y-auto p-2 space-y-1 no-scrollbar">
                <div class="text-center py-12 text-gray-500 text-xs">Загрузка пользователей...</div>
            </div>
        </div>

        <!-- Окно активного чата (Выезжающее на мобильных) -->
        <div id="chat-panel" class="hidden fixed inset-0 bg-gray-950 flex flex-col z-30 page-transition">
            <!-- Шапка чата -->
            <div class="p-3 bg-gray-900 border-b border-gray-800 flex items-center justify-between shrink-0">
                <div class="flex items-center gap-3">
                    <button onclick="backToChats()" class="p-2 text-gray-400 hover:text-white rounded-lg">
                        <i class="fa-solid fa-arrow-left"></i>
                    </button>
                    <div class="w-9 h-9 bg-indigo-600 rounded-full flex items-center justify-center font-bold text-white text-xs" id="chat-avatar">?</div>
                    <div>
                        <h3 class="font-bold text-xs" id="chat-title">@user</h3>
                        <p class="text-[9px] text-gray-400" id="chat-status">Загрузка...</p>
                    </div>
                </div>

                <!-- Кнопки звонков и файлов -->
                <div class="flex items-center gap-1">
                    <button onclick="initiateCall(false)" class="p-2 text-green-400 hover:bg-gray-800 rounded-lg text-sm" title="Аудио">
                        <i class="fa-solid fa-phone"></i>
                    </button>
                    <button onclick="initiateCall(true)" class="p-2 text-indigo-400 hover:bg-gray-800 rounded-lg text-sm" title="Видео">
                        <i class="fa-solid fa-video"></i>
                    </button>
                    <label class="p-2 text-amber-400 hover:bg-gray-800 rounded-lg text-sm cursor-pointer" title="Файл">
                        <i class="fa-solid fa-paperclip"></i>
                        <input id="file-uploader" type="file" class="hidden" onchange="sendP2PFile(this)">
                    </label>
                </div>
            </div>

            <!-- Сетка звонков (Аудио / Видеостримы) -->
            <div id="call-panel" class="hidden bg-black p-3 border-b border-gray-800 flex flex-col justify-between relative min-h-[220px]">
                <div id="video-grid" class="grid grid-cols-1 sm:grid-cols-2 gap-2 w-full h-full min-h-[140px] overflow-y-auto no-scrollbar">
                    <!-- Сюда встраиваются видео стримы -->
                </div>
                <div class="flex justify-center items-center gap-3 mt-2 bg-gray-900/90 backdrop-blur px-3 py-1.5 rounded-xl border border-gray-800 max-w-max mx-auto">
                    <button id="mic-toggle-btn" onclick="toggleLocalAudio()" class="p-2.5 bg-gray-850 hover:bg-gray-800 rounded-full text-white text-xs">
                        <i class="fa-solid fa-microphone"></i>
                    </button>
                    <button id="video-toggle-btn" onclick="toggleLocalVideo()" class="p-2.5 bg-gray-850 hover:bg-gray-800 rounded-full text-white text-xs">
                        <i class="fa-solid fa-video"></i>
                    </button>
                    <button onclick="closeActiveCall()" class="p-2.5 bg-red-600 hover:bg-red-500 rounded-full text-white text-xs">
                        <i class="fa-solid fa-phone-slash"></i>
                    </button>
                </div>
            </div>

            <!-- История сообщений -->
            <div id="chat-history" class="flex-grow overflow-y-auto p-4 space-y-3 bg-gray-950/50 no-scrollbar"></div>

            <!-- Индикатор прогресса P2P загрузки -->
            <div id="progress-container" class="hidden px-4 py-2 bg-gray-900 border-t border-gray-800 text-[10px] flex items-center justify-between gap-4">
                <span class="truncate max-w-[40%] text-gray-400" id="progress-filename">файл.bin</span>
                <div class="flex-grow bg-gray-800 h-1.5 rounded-full overflow-hidden">
                    <div id="progress-bar" class="bg-indigo-500 h-full w-[0%] transition-all"></div>
                </div>
                <span id="progress-percent" class="font-mono text-gray-500">0%</span>
            </div>

            <!-- Панель ввода -->
            <div class="p-3 bg-gray-900 border-t border-gray-800 flex items-center gap-2 shrink-0">
                <input id="message-input" type="text" placeholder="Напишите сообщение..." class="flex-grow py-2.5 px-3 bg-gray-950 border border-gray-850 rounded-xl outline-none focus:border-indigo-500 text-xs text-white" onkeydown="if(event.key === 'Enter') sendChatMessage()">
                <button onclick="sendChatMessage()" class="p-2.5 bg-indigo-600 hover:bg-indigo-500 rounded-xl text-white text-xs">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </div>
        </div>

    </div>

    <!-- Модальное окно ВХОДЯЩЕГО звонка -->
    <div id="incoming-modal" class="hidden fixed inset-0 bg-black/95 backdrop-blur z-50 flex items-center justify-center p-4">
        <div class="bg-gray-900 border border-gray-800 p-6 rounded-2xl max-w-xs w-full text-center space-y-6 shadow-2xl">
            <div class="relative inline-block">
                <div class="w-16 h-16 bg-green-500/10 border border-green-500/20 text-green-400 rounded-full flex items-center justify-center text-2xl mx-auto animate-bounce">
                    <i class="fa-solid fa-phone-volume"></i>
                </div>
            </div>
            <div>
                <h4 class="text-lg font-bold" id="caller-username-label">@user</h4>
                <p class="text-gray-400 text-xs mt-1" id="caller-media-label">Входящий вызов...</p>
            </div>
            <div class="flex justify-center gap-3">
                <button onclick="answerCall(true)" class="py-2.5 px-4 bg-green-600 hover:bg-green-500 text-white rounded-xl text-xs font-bold flex items-center gap-2 transition">
                    <i class="fa-solid fa-check"></i> Принять
                </button>
                <button onclick="answerCall(false)" class="py-2.5 px-4 bg-red-600 hover:bg-red-500 text-white rounded-xl text-xs font-bold flex items-center gap-2 transition">
                    <i class="fa-solid fa-xmark"></i> Сбросить
                </button>
            </div>
        </div>
    </div>

    <!-- Модальное окно создания группы -->
    <div id="group-modal" class="hidden fixed inset-0 bg-black/80 backdrop-blur z-40 flex items-center justify-center p-4">
        <div class="bg-gray-900 border border-gray-800 p-5 rounded-2xl max-w-xs w-full space-y-4">
            <h3 class="text-sm font-bold">Многопользовательская комната</h3>
            <p class="text-[10px] text-gray-400">Введите название виртуальной комнаты. Все участники в этой комнате созвонятся автоматически.</p>
            <input id="group-name-input" type="text" placeholder="название-комнаты" class="w-full py-2 px-3 bg-gray-950 border border-gray-850 rounded-xl text-xs focus:border-indigo-500 outline-none text-white">
            <div class="flex justify-end gap-2 pt-1 text-xs">
                <button onclick="closeGroupDialog()" class="py-2 px-3 bg-gray-850 text-gray-400 rounded-lg">Отмена</button>
                <button onclick="joinGroupRoom()" class="py-2 px-3 bg-emerald-600 text-white rounded-lg font-semibold">Войти</button>
            </div>
        </div>
    </div>

    <!-- Скрипт-Логика -->
    <script>
        // --- 1. ВАШИ ДАННЫЕ ИЗ FIREBASE SDK ---
        const firebaseConfig = {
            apiKey: "AIzaSyCXsCK1r7pxX_B-8pxwE_NfN55oQEvMfCM",
            authDomain: "webcall-44e9e.firebaseapp.com",
            projectId: "webcall-44e9e",
            storageBucket: "webcall-44e9e.firebasestorage.app",
            messagingSenderId: "730823632799",
            appId: "1:730823632799:web:c964c0fce688ff7e2abfaa",
            measurementId: "G-HST7R21W3W"
        };

        // Инициализация
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Умная изоляция путей согласно правилам безопасности
        const appId = 'webcall-44e9e';
        const usersPath = `artifacts/${appId}/public/data/users`;
        const chatsPath = `artifacts/${appId}/public/data/chats`;

        // Стейт
        let me = null;
        let selectedUser = null;
        let groupRoomId = null;
        let peer = null;
        let myStream = null;
        let calls = {};
        let activeDataChannels = {};
        let incomingCall = null;

        // Аппаратный статус
        let audioMuted = false;
        let videoMuted = false;

        // --- 2. ВЕБ-СИНТЕЗ ЗВУКОВЫХ СИГНАЛОВ (AudioContext) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playAlert(freq, duration, type = 'sine') {
            try {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = type;
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            } catch (e) { console.warn("Audio failure", e); }
        }

        function triggerNotification(text) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-text').textContent = text;
            toast.classList.remove('opacity-0', 'pointer-events-none');
            setTimeout(() => {
                toast.classList.add('opacity-0', 'pointer-events-none');
            }, 3000);
        }

        // --- 3. АВТОРИЗАЦИЯ БЕЗ E-MAIL (Маппинг юзернейма на виртуальную почту) ---
        async function authAction(isRegister) {
            const username = document.getElementById('username-input').value.trim().toLowerCase();
            const pass = document.getElementById('password-input').value;

            if (!username || pass.length < 6) {
                triggerNotification("Имя пустое, или пароль меньше 6 знаков!");
                return;
            }

            const mockEmail = `${username}@webcall.internal`;

            try {
                if (isRegister) {
                    const check = await db.collection(usersPath).where('username', '==', username).get();
                    if (!check.empty) {
                        triggerNotification("Этот юзернейм уже занят!");
                        return;
                    }

                    const credentials = await auth.createUserWithEmailAndPassword(mockEmail, pass);
                    const user = credentials.user;

                    await db.collection(usersPath).doc(user.uid).set({
                        uid: user.uid,
                        username: username,
                        peerId: '',
                        status: 'online'
                    });
                    triggerNotification("Регистрация успешна!");
                } else {
                    await auth.signInWithEmailAndPassword(mockEmail, pass);
                    triggerNotification("Успешный вход!");
                }
            } catch (e) {
                triggerNotification("Ошибка: " + e.message);
            }
        }

        auth.onAuthStateChanged(async (user) => {
            if (user) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-screen').classList.remove('hidden');

                const doc = await db.collection(usersPath).doc(user.uid).get();
                if (doc.exists) {
                    me = doc.data();
                    document.getElementById('my-username-label').textContent = me.username;
                    document.getElementById('my-avatar').textContent = me.username[0].toUpperCase();
                    await db.collection(usersPath).doc(me.uid).update({ status: 'online' });
                    
                    setupPeer();
                    trackActiveUsers();
                }
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('main-screen').classList.add('hidden');
            }
        });

        async function signOutUser() {
            if (me) {
                await db.collection(usersPath).doc(me.uid).update({ status: 'offline', peerId: '' });
            }
            if (peer) peer.destroy();
            await auth.signOut();
            window.location.reload();
        }

        // --- 4. РАБОТА С PEERJS ---
        function setupPeer() {
            peer = new Peer(null, {
                debug: 1,
                config: {
                    iceServers: [
                        { urls: 'stun:stun.l.google.com:19302' },
                        { urls: 'stun:stun1.l.google.com:19302' }
                    ]
                }
            });

            peer.on('open', (id) => {
                db.collection(usersPath).doc(me.uid).update({ peerId: id });
            });

            peer.on('call', (call) => {
                incomingCall = call;
                playAlert(520, 0.4);
                
                db.collection(usersPath).where('peerId', '==', call.peer).get().then(snap => {
                    let caller = "Аноним";
                    if (!snap.empty) caller = snap.docs[0].data().username;

                    document.getElementById('caller-username-label').textContent = "@" + caller;
                    document.getElementById('caller-media-label').textContent = call.options.metadata?.video ? "Входящий видеовызов" : "Входящий аудиовызов";
                    document.getElementById('incoming-modal').classList.remove('hidden');
                });
            });

            peer.on('connection', (conn) => {
                registerP2PDataChannel(conn);
            });
        }

        // --- 5. ЖИВАЯ ТРАНСЛЯЦИЯ КОНТАКТОВ И ЧАТА ---
        function trackActiveUsers() {
            db.collection(usersPath).onSnapshot((snap) => {
                const list = document.getElementById('contacts-list');
                list.innerHTML = '';

                if (snap.size <= 1) {
                    list.innerHTML = `<div class="text-center py-12 text-gray-500 text-xs">Вы пока один в системе</div>`;
                    return;
                }

                snap.forEach(doc => {
                    const u = doc.data();
                    if (u.uid === me.uid) return;

                    const active = u.status === 'online';
                    const item = document.createElement('div');
                    item.className = "flex items-center gap-3 p-3 bg-gray-900/40 rounded-xl cursor-pointer border border-transparent active:border-gray-800";
                    item.onclick = () => openPersonalChat(u);

                    item.innerHTML = `
                        <div class="relative">
                            <div class="w-10 h-10 bg-indigo-700 rounded-full flex items-center justify-center text-xs font-bold text-white">
                                ${u.username[0].toUpperCase()}
                            </div>
                            <span class="absolute bottom-0 right-0 w-2.5 h-2.5 rounded-full border border-gray-950 ${active ? 'bg-green-500' : 'bg-gray-600'}"></span>
                        </div>
                        <div class="flex-grow min-w-0">
                            <div class="font-bold text-xs truncate">@${u.username}</div>
                            <div class="text-[9px] text-gray-500">${active ? 'Доступен для звонка' : 'Офлайн'}</div>
                        </div>
                    `;
                    list.appendChild(item);
                });
            });
        }

        function openPersonalChat(user) {
            selectedUser = user;
            groupRoomId = null;

            document.getElementById('chat-panel').classList.remove('hidden');
            document.getElementById('chat-avatar').textContent = user.username[0].toUpperCase();
            document.getElementById('chat-title').textContent = "@" + user.username;
            document.getElementById('chat-status').textContent = user.status === 'online' ? 'В сети' : 'Не в сети';
            document.getElementById('chat-history').innerHTML = '';

            loadChatHistory();

            // P2P Data Channel handshake
            if (user.peerId && !activeDataChannels[user.peerId]) {
                const conn = peer.connect(user.peerId, { metadata: { username: me.username } });
                registerP2PDataChannel(conn);
            }
        }

        function backToChats() {
            document.getElementById('chat-panel').classList.add('hidden');
            selectedUser = null;
            closeActiveCall();
        }

        // --- 6. ОБМЕН СООБЩЕНИЯМИ ЧЕРЕЗ FIRESTORE И P2P ---
        function loadChatHistory() {
            if (!selectedUser) return;
            const roomId = [me.uid, selectedUser.uid].sort().join('_');

            db.collection(chatsPath)
                .where('roomId', '==', roomId)
                .onSnapshot((snap) => {
                    const container = document.getElementById('chat-history');
                    container.innerHTML = '';
                    
                    let msgs = [];
                    snap.forEach(doc => msgs.push(doc.data()));
                    msgs.sort((a,b) => (a.time?.seconds || 0) - (b.time?.seconds || 0));

                    msgs.forEach(m => {
                        const isMe = m.senderId === me.uid;
                        renderBubble(m.senderName, m.text, isMe);
                    });
                    container.scrollTop = container.scrollHeight;
                });
        }

        function renderBubble(sender, text, isMe, isHTML = false) {
            const container = document.getElementById('chat-history');
            const wrap = document.createElement('div');
            wrap.className = `flex flex-col ${isMe ? 'items-end' : 'items-start'} w-full`;

            wrap.innerHTML = `
                <div class="max-w-[80%]">
                    <span class="text-[9px] text-gray-500 font-bold px-1">${isMe ? 'Вы' : '@' + sender}</span>
                    <div class="px-3 py-2 rounded-xl text-xs ${isMe ? 'bg-indigo-600 text-white rounded-tr-none' : 'bg-gray-800 text-gray-100 rounded-tl-none'}">
                        ${isHTML ? text : text.replace(/[&<>'"]/g, t => ({'&':'&amp;','<':'&lt;','>':'&gt;','\'':'&#39;','"':'&quot;'}[t] || t))}
                    </div>
                </div>
            `;
            container.appendChild(wrap);
            container.scrollTop = container.scrollHeight;
        }

        function sendChatMessage() {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            if (!text) return;

            if (selectedUser) {
                // P2P Direct
                if (selectedUser.peerId && activeDataChannels[selectedUser.peerId]) {
                    activeDataChannels[selectedUser.peerId].send({ type: 'text', sender: me.username, text });
                }
                // Firestore Log
                const roomId = [me.uid, selectedUser.uid].sort().join('_');
                db.collection(chatsPath).add({
                    roomId,
                    senderId: me.uid,
                    senderName: me.username,
                    text,
                    time: firebase.firestore.FieldValue.serverTimestamp()
                });
                playAlert(800, 0.1);
            } else if (groupRoomId) {
                // Группа
                Object.values(activeDataChannels).forEach(conn => {
                    conn.send({ type: 'text', sender: me.username, text: `[Группа] ${text}` });
                });
                renderBubble(me.username, text, true);
                playAlert(800, 0.1);
            }
            input.value = '';
        }

        // --- 7. ПЕРЕДАЧА ФАЙЛОВ P2P DATA CHANNELS ---
        function registerP2PDataChannel(conn) {
            activeDataChannels[conn.peer] = conn;

            conn.on('data', (data) => {
                if (data.type === 'text') {
                    renderBubble(data.sender, data.text, false);
                    playAlert(600, 0.15);
                } else if (data.type === 'file-start') {
                    window.fileSession = {
                        name: data.name,
                        size: data.size,
                        mime: data.mime,
                        chunks: [],
                        received: 0
                    };
                    document.getElementById('progress-filename').textContent = data.name;
                    document.getElementById('progress-container').classList.remove('hidden');
                } else if (data.type === 'file-data') {
                    const session = window.fileSession;
                    if (session) {
                        session.chunks.push(data.chunk);
                        session.received += data.chunk.byteLength;
                        const pct = Math.min(100, Math.floor((session.received / session.size) * 100));
                        document.getElementById('progress-bar').style.width = pct + '%';
                        document.getElementById('progress-percent').textContent = pct + '%';

                        if (session.received >= session.size) {
                            const blob = new Blob(session.chunks, { type: session.mime });
                            const url = URL.createObjectURL(blob);
                            renderBubble(conn.metadata?.username || 'Файл', `
                                <div class="p-2 border border-indigo-500/20 rounded-lg space-y-2">
                                    <div class="font-bold text-amber-400 text-[10px]"><i class="fa-solid fa-file"></i> Получен файл!</div>
                                    <div class="text-[9px] text-gray-400 break-all">${session.name}</div>
                                    <a href="${url}" download="${session.name}" class="inline-block px-3 py-1 bg-indigo-600 text-white rounded font-bold text-[10px]">Скачать</a>
                                </div>
                            `, false, true);
                            document.getElementById('progress-container').classList.add('hidden');
                        }
                    }
                }
            });
        }

        function sendP2PFile(input) {
            const file = input.files[0];
            if (!file || !selectedUser || !activeDataChannels[selectedUser.peerId]) return;

            const conn = activeDataChannels[selectedUser.peerId];
            document.getElementById('progress-filename').textContent = file.name;
            document.getElementById('progress-container').classList.remove('hidden');

            conn.send({ type: 'file-start', name: file.name, size: file.size, mime: file.type });

            const sliceSize = 16384;
            const reader = new FileReader();
            let offset = 0;

            reader.onload = (e) => {
                conn.send({ type: 'file-data', chunk: e.target.result });
                offset += e.target.result.byteLength;
                const pct = Math.min(100, Math.floor((offset / file.size) * 100));
                document.getElementById('progress-bar').style.width = pct + '%';
                document.getElementById('progress-percent').textContent = pct + '%';

                if (offset < file.size) {
                    readChunk();
                } else {
                    renderBubble('Вы', `Отправлен файл: <span class="text-amber-400">${file.name}</span>`, true, true);
                    document.getElementById('progress-container').classList.add('hidden');
                }
            };

            function readChunk() {
                const slice = file.slice(offset, offset + sliceSize);
                reader.readAsArrayBuffer(slice);
            }
            readChunk();
        }

        // --- 8. СОВЕРШЕНИЕ ЗВOНКОВ (WebRTC) ---
        async function initiateCall(video = false) {
            if (!selectedUser || !selectedUser.peerId) return;

            try {
                myStream = await navigator.mediaDevices.getUserMedia({ audio: true, video });
                document.getElementById('call-panel').classList.remove('hidden');
                addStreamToGrid('me', myStream, true);

                const call = peer.call(selectedUser.peerId, myStream, { metadata: { video } });
                calls[selectedUser.peerId] = call;

                call.on('stream', (remoteStream) => {
                    addStreamToGrid(selectedUser.peerId, remoteStream, false);
                });
            } catch (e) {
                triggerNotification("Ошибка доступа к камере/микрофону!");
            }
        }

        async function answerCall(accept) {
            document.getElementById('incoming-modal').classList.add('hidden');
            if (!incomingCall) return;

            if (accept) {
                try {
                    const video = incomingCall.options.metadata?.video;
                    myStream = await navigator.mediaDevices.getUserMedia({ audio: true, video });
                    document.getElementById('call-panel').classList.remove('hidden');
                    addStreamToGrid('me', myStream, true);

                    incomingCall.answer(myStream);
                    calls[incomingCall.peer] = incomingCall;

                    incomingCall.on('stream', (remoteStream) => {
                        addStreamToGrid(incomingCall.peer, remoteStream, false);
                    });
                } catch (e) {
                    triggerNotification("Ошибка стриминга!");
                    incomingCall.close();
                }
            } else {
                incomingCall.close();
            }
        }

        function addStreamToGrid(id, stream, isMe) {
            const grid = document.getElementById('video-grid');
            let v = document.getElementById(`v-${id}`);

            if (!v) {
                const wrap = document.createElement('div');
                wrap.id = `wrap-${id}`;
                wrap.className = "relative bg-black rounded-lg overflow-hidden border border-gray-800 aspect-video flex items-center justify-center";

                v = document.createElement('video');
                v.id = `v-${id}`;
                v.autoplay = true;
                v.playsInline = true;
                if (isMe) v.muted = true;
                v.className = "w-full h-full object-cover";

                const nameTag = document.createElement('div');
                nameTag.className = "absolute bottom-1 left-1 bg-black/60 px-2 py-0.5 rounded text-[8px] font-bold";
                nameTag.textContent = isMe ? 'Вы' : '@собеседник';

                wrap.appendChild(v);
                wrap.appendChild(nameTag);
                grid.appendChild(wrap);
            }
            v.srcObject = stream;
        }

        function closeActiveCall() {
            Object.values(calls).forEach(c => c.close());
            calls = {};

            if (myStream) {
                myStream.getTracks().forEach(t => t.stop());
                myStream = null;
            }

            document.getElementById('video-grid').innerHTML = '';
            document.getElementById('call-panel').classList.add('hidden');
        }

        function toggleLocalAudio() {
            if (myStream) {
                audioMuted = !audioMuted;
                myStream.getAudioTracks().forEach(t => t.enabled = !audioMuted);
                const btn = document.getElementById('mic-toggle-btn');
                btn.className = audioMuted ? "p-2.5 bg-red-600 rounded-full text-white text-xs" : "p-2.5 bg-gray-850 rounded-full text-white text-xs";
            }
        }

        function toggleLocalVideo() {
            if (myStream) {
                videoMuted = !videoMuted;
                myStream.getVideoTracks().forEach(t => t.enabled = !videoMuted);
                const btn = document.getElementById('video-toggle-btn');
                btn.className = videoMuted ? "p-2.5 bg-red-600 rounded-full text-white text-xs" : "p-2.5 bg-gray-850 rounded-full text-white text-xs";
            }
        }

        // --- 9. ГРУППОВЫЕ КОНФЕРЕНЦИИ ---
        function openGroupDialog() {
            document.getElementById('group-modal').classList.remove('hidden');
        }

        function closeGroupDialog() {
            document.getElementById('group-modal').classList.add('hidden');
        }

        async function joinGroupRoom() {
            const room = document.getElementById('group-name-input').value.trim().toLowerCase();
            if (!room) return;

            closeGroupDialog();
            groupRoomId = room;
            selectedUser = null;

            document.getElementById('chat-panel').classList.remove('hidden');
            document.getElementById('chat-avatar').textContent = "G";
            document.getElementById('chat-title').textContent = "Комната: " + room;
            document.getElementById('chat-status').textContent = "Групповое подключение...";
            document.getElementById('chat-history').innerHTML = '';

            renderBubble('Система', `Вход в конференц-комнату <b>${room}</b> выполнен.`, true, true);

            const roomRef = db.collection(`artifacts/${appId}/public/data/grp_${room}`);
            await roomRef.doc(me.uid).set({
                uid: me.uid,
                username: me.username,
                peerId: peer.id
            });

            roomRef.onSnapshot((snap) => {
                snap.forEach(doc => {
                    const u = doc.data();
                    if (u.uid !== me.uid && u.peerId && !activeDataChannels[u.peerId]) {
                        const conn = peer.connect(u.peerId, { metadata: { username: me.username } });
                        registerP2PDataChannel(conn);
                    }
                });
            });

            // Автозвонок всей группе
            try {
                myStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
                document.getElementById('call-panel').classList.remove('hidden');
                addStreamToGrid('me', myStream, true);

                const snap = await roomRef.get();
                snap.forEach(doc => {
                    const u = doc.data();
                    if (u.uid !== me.uid && u.peerId) {
                        const call = peer.call(u.peerId, myStream, { metadata: { video: true } });
                        calls[u.peerId] = call;
                        call.on('stream', (remoteStream) => {
                            addStreamToGrid(u.peerId, remoteStream, false);
                        });
                    }
                });
            } catch(e) { console.error(e); }
        }
    </script>
